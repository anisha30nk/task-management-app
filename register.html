<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(rgba(0,0,0,0.82), rgba(0,0,0,0.82)),
    url('hero.jpg');
    background-size:cover;
    background-position:center;
}

.register-container{
    width:950px;
    max-width:95%;
    display:flex;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 35px rgba(0,0,0,0.3);
}

.left{
    flex:1;
    background:linear-gradient(135deg,#fff8dc,#fff3b0);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:40px;
}

.left h1{
    color:#7a6500;
    font-size:42px;
    margin-bottom:15px;
}

.left p{
    color:#5f5400;
    text-align:center;
    line-height:1.8;
}

.right{
    flex:1;
    padding:40px;
}

.right h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.input-group{
    margin-bottom:16px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-weight:500;
}

.input-group input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
}

.input-group input:focus{
    border-color:#f4c430;
}

button{
    width:100%;
    padding:14px;
    background:#f4c430;
    border:none;
    border-radius:10px;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#e6b800;
}

.error{
    color:red;
    font-size:14px;
    margin-top:5px;
}

.bottom-text{
    text-align:center;
    margin-top:20px;
}

.bottom-text a{
    color:#c28b00;
    text-decoration:none;
    font-weight:600;
}

@media(max-width:768px){
    .register-container{
        flex-direction:column;
    }
}
</style>
</head>
<body>

<div class="register-container">

    <div class="left">
        <h1>TaskFlow</h1>
        <p>Create your account and start managing tasks efficiently.</p>
    </div>

    <div class="right">
        <h2>Create Account</h2>

        <form id="registerForm">

            <div class="input-group">
                <label>Name</label>
                <input type="text" id="name" placeholder="Enter name">
                <div class="error" id="nameError"></div>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="text" id="email" placeholder="Enter email">
                <div class="error" id="emailError"></div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
                <div class="error" id="passwordError"></div>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm password">
                <div class="error" id="confirmError"></div>
            </div>

            <button type="submit">Register</button>

        </form>

        <div class="bottom-text">
            Already have an account?
            <a href="login.html">Login</a>
        </div>
    </div>

</div>

<script>
document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();
    let confirmPassword = document.getElementById("confirmPassword").value.trim();

    let nameError = document.getElementById("nameError");
    let emailError = document.getElementById("emailError");
    let passwordError = document.getElementById("passwordError");
    let confirmError = document.getElementById("confirmError");

    nameError.innerHTML = "";
    emailError.innerHTML = "";
    passwordError.innerHTML = "";
    confirmError.innerHTML = "";

    let valid = true;

    let namePattern = /^[A-Za-z ]+$/;
    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if(name === ""){
        nameError.innerHTML = "Name is required";
        valid = false;
    }
    else if(!name.match(namePattern)){
        nameError.innerHTML = "Only letters allowed";
        valid = false;
    }

    if(email === ""){
        emailError.innerHTML = "Email is required";
        valid = false;
    }
    else if(!email.match(emailPattern)){
        emailError.innerHTML = "Invalid email";
        valid = false;
    }

    if(password === ""){
        passwordError.innerHTML = "Password is required";
        valid = false;
    }
    else if(password.length < 6){
        passwordError.innerHTML = "Minimum 6 characters";
        valid = false;
    }

    if(confirmPassword === ""){
        confirmError.innerHTML = "Confirm password required";
        valid = false;
    }
    else if(password !== confirmPassword){
        confirmError.innerHTML = "Passwords do not match";
        valid = false;
    }

    if(valid){
        alert("Registration Successful!");
        window.location.href = "login.html";
    }
});
</script>

</body>
</html>
