<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Task</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,0,0,0.82),rgba(0,0,0,0.82)),
url('hero.jpg');
background-size:cover;
background-position:center;
}

.container{
background:white;
width:500px;
max-width:95%;
padding:40px;
border-radius:20px;
}

h1{
text-align:center;
margin-bottom:25px;
}

.input-group{
margin-bottom:18px;
}

label{
display:block;
margin-bottom:8px;
}

input, textarea, select{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
}

button{
width:100%;
padding:14px;
background:#f4c430;
border:none;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.error{
color:red;
font-size:14px;
margin-top:5px;
}
</style>
</head>

<body>

<div class="container">
<h1>Edit Task</h1>

<form id="editForm">

<div class="input-group">
<label>Task Title</label>
<input type="text" id="title" value="Frontend Development">
<div class="error" id="titleError"></div>
</div>

<div class="input-group">
<label>Description</label>
<textarea id="description">Complete dashboard UI</textarea>
<div class="error" id="descError"></div>
</div>

<div class="input-group">
<label>Due Date</label>
<input type="date" id="date">
<div class="error" id="dateError"></div>
</div>

<div class="input-group">
<label>Status</label>
<select id="status">
<option>Pending</option>
<option>Completed</option>
</select>
</div>

<button type="submit">Update Task</button>

</form>
</div>

<script>
document.getElementById("editForm").addEventListener("submit", function(e){
e.preventDefault();

let title=document.getElementById("title").value.trim();
let desc=document.getElementById("description").value.trim();
let date=document.getElementById("date").value;

document.getElementById("titleError").innerHTML="";
document.getElementById("descError").innerHTML="";
document.getElementById("dateError").innerHTML="";

let valid=true;

if(title===""){
document.getElementById("titleError").innerHTML="Title required";
valid=false;
}

if(desc===""){
document.getElementById("descError").innerHTML="Description required";
valid=false;
}

if(date===""){
document.getElementById("dateError").innerHTML="Date required";
valid=false;
}

if(valid){
alert("Task updated successfully!");
window.location.href="dashboard.html";
}
});
</script>

</body>
</html>
